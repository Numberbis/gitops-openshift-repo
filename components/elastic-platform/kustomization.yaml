---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Pas de `namespace:` ici : ce composant porte des objets cluster-scoped
# (ClusterSecretStore, ClusterIssuer, SCC, ClusterRoleBinding) ET des
# objets namespaced (NetworkPolicy, ServiceAccount, Namespace).
resources:
  - namespace.yaml
  - networkpolicy.yaml
  - cluster-secret-store.yaml
  - cluster-issuer.yaml
  - scc-elastic-agent.yaml
