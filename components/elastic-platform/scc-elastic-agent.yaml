---
# SecurityContextConstraints dédié à Elastic Agent (mode DaemonSet).
#
# Pourquoi pas le SCC `privileged` global :
#   - `privileged` autorise *tout*. Pour collecter cgroups + journald,
#     l'Agent a besoin de hostPath, hostNetwork et de quelques capabilities
#     précises — pas de la totale.
#   - On clone donc le SCC `node-exporter` (déjà whitelisté pour ce profil)
#     et on l'attribue uniquement au SA `elastic-agent` du namespace
#     `elastic` via le RoleBinding ci-dessous.
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: elastic-agent-scc
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: true
allowHostPID: true                  # Agent lit /proc pour les métriques host
allowHostPorts: false
allowPrivilegeEscalation: true
allowPrivilegedContainer: false     # ⚠ false → on n'est PAS privileged
allowedCapabilities:
  - AUDIT_CONTROL
  - AUDIT_READ
  - DAC_READ_SEARCH
  - NET_ADMIN
  - NET_RAW
  - SYS_ADMIN                       # nécessaire pour /sys/fs/cgroup
  - SYS_PTRACE
  - SYS_RESOURCE
  - SYSLOG
defaultAddCapabilities: null
fsGroup:
  type: RunAsAny
readOnlyRootFilesystem: false
runAsUser:
  type: RunAsAny                    # Agent doit tourner en uid 0 pour /proc
seLinuxContext:
  type: MustRunAs
  seLinuxOptions:
    type: spc_t                     # type SELinux « super-privileged container »
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - hostPath
  - persistentVolumeClaim
  - projected
  - secret
users: []
groups: []
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elastic-agent
  namespace: elastic
---
# Bind le SCC au SA elastic-agent (et seulement à lui).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elastic-agent-scc-use
rules:
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    resourceNames: ["elastic-agent-scc"]
    verbs: ["use"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elastic-agent-scc-use
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elastic-agent-scc-use
subjects:
  - kind: ServiceAccount
    name: elastic-agent
    namespace: elastic
---
# RBAC fonctionnel d'Elastic Agent : lecture des objets cluster pour
# enrichir les events (kube-state-metrics-like).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elastic-agent
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "events", "pods", "services", "configmaps", "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "watch", "list"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elastic-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elastic-agent
subjects:
  - kind: ServiceAccount
    name: elastic-agent
    namespace: elastic
---
# PriorityClass pour protéger les nœuds master Elasticsearch d'une éviction
# en cas de pression mémoire/disque.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: elastic-master-priority
value: 1000000
globalDefault: false
description: "Master nodes Elasticsearch — éviction interdite (quorum)."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: elastic-data-priority
value: 900000
globalDefault: false
description: "Data nodes Elasticsearch — protection forte mais inférieure aux masters."
