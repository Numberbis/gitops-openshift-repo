---
# ServiceAccount utilisé par External Secrets Operator pour s'authentifier
# auprès de Vault (méthode Kubernetes auth — Vault valide le SA token via
# la TokenReview API d'OpenShift).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-vault
  namespace: elastic
---
# Role Vault → role K8s côté Vault (à provisionner côté Vault hors-GitOps).
# Ce binding permet au SA ci-dessus d'appeler la TokenReview, sans quoi
# Vault ne peut pas valider le token.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-secrets-vault-tokenreview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: external-secrets-vault
    namespace: elastic
---
# ClusterSecretStore : pointeur global vers Vault, utilisable depuis
# n'importe quel ExternalSecret (dans `elastic` ET `elastic-monitoring`).
#
# ⚠ REMPLACER `server`, `path`, `role` par les valeurs de votre Vault.
# Le path KV-v2 doit correspondre à la policy autorisant les SA elastic.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-elastic
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      path: "secret"             # KV-v2 mount path
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"   # auth backend mount Vault
          role: "elastic-prod"      # role Vault → policy `elastic-prod-read`
          serviceAccountRef:
            name: external-secrets-vault
            namespace: elastic
