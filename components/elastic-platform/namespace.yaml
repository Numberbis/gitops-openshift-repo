---
# Namespace dédié au cluster Elasticsearch de prod.
#
# Conventions :
#   - Un namespace = un cluster Elastic logique. À 800 To, on ne mutualise
#     pas avec d'autres workloads.
#   - Le label `openshift.io/cluster-monitoring` n'est PAS posé : la stack
#     Elastic est observée par un cluster Elastic *séparé*
#     (`elastic-monitoring`), pas par Prometheus OpenShift.
#   - Le label `pod-security.kubernetes.io/enforce: restricted` aligne le
#     namespace sur le PodSecurity standard restricted, qu'ECK respecte
#     depuis 2.5.
apiVersion: v1
kind: Namespace
metadata:
  name: elastic
  labels:
    name: elastic
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
