---
# Dashboard "Kubernetes / Compute Resources / Cluster" (ID 7249 sur grafana.com).
# Référence un dashboard public via son ID, l'opérateur le télécharge à la
# première synchro et le maintient à jour.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kubernetes-cluster-overview
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "prometheus-thanos"
  grafanaCom:
    id: 7249
