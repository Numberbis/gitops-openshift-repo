---
# ServiceAccount qui sera utilisé par Grafana pour s'authentifier auprès de
# Thanos Querier d'OpenShift. Le token de ce SA sera passé en bearer header
# par la datasource (cf. grafana-datasource.yaml).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-sa
  namespace: grafana
---
# Secret contenant un token long-lived pour le ServiceAccount grafana-sa.
# Sur OpenShift 4.11+ les tokens auto-générés sont éphémères, il faut donc
# créer explicitement un Secret de type service-account-token.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-sa-token
  namespace: grafana
  annotations:
    kubernetes.io/service-account.name: grafana-sa
type: kubernetes.io/service-account-token
