---
# Souscription à External Secrets Operator (ESO), qui matérialise les Secrets
# K8s natifs à partir d'un backend de coffre-fort (Vault, AWS SM, Azure KV,
# GCP SM, IBM SM…).
#
# Sur la stack Elastic, ESO est *le* point de découplage entre Git (où vit
# la déclaration `ExternalSecret`) et le secret réel (clés S3 pour les
# snapshots, mots de passe internes ES, clé d'encryption Kibana, token Fleet,
# certificats applicatifs).
#
# Channel `stable` + approval Manual pour rester aligné avec la politique
# d'upgrade des opérateurs critiques de la plateforme.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: external-secrets-operator
  namespace: openshift-operators
spec:
  channel: stable
  installPlanApproval: Manual
  name: external-secrets-operator
  source: community-operators
  sourceNamespace: openshift-marketplace
  startingCSV: external-secrets-operator.v0.10.5
