---
# Local Storage Operator (LSO) — découpe les disques bruts attachés aux
# nœuds (NVMe local par exemple) en PV `local-volume`, qui alimentent une
# StorageClass `nvme-local` consommée par les nodeSets data_hot et
# data_frozen du cluster Elasticsearch.
#
# Pourquoi LSO et pas un StorageClass cloud :
#   * Performance : les data_hot 800 To exigent NVMe local pour atteindre
#     les > 5000 IOPS / latence < 5 ms cible.
#   * Coût : le NVMe local est le seul tier économiquement raisonnable
#     pour 128 TiB de capacity hot répartis sur 8 nœuds.
#
# LSO doit vivre dans son propre namespace `openshift-local-storage` —
# c'est une convention Red Hat, ne PAS la changer.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-local-storage
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-local-storage
  namespace: openshift-local-storage
spec:
  targetNamespaces:
    - openshift-local-storage
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: local-storage-operator
  namespace: openshift-local-storage
spec:
  channel: stable
  installPlanApproval: Manual
  name: local-storage-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  startingCSV: local-storage-operator.v4.16.0   # ⚠ aligner sur la version OCP
