---
# App-of-Apps : application racine qui synchronise toutes les autres
# applications ArgoCD définies dans le dossier apps/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-monitoring-stack
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # >>> À REMPLACER par l'URL de votre fork du dépôt <<<
    repoURL: https://gitlab.com/Numberbis/gitops-openshift-repo.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

      
